// health banner: is the latest data from today (UTC)? tells you at a glance
// whether today's scans fired, without needing to read the tables.
(function(){
 const el=document.getElementById('updated');
 const today=new Date().toISOString().slice(0,10);
 const dataDay=(D.updated||'').slice(0,10);
 const fresh=dataDay===today;
 const marks=(D.equity||[]).filter(e=>(e.ts||'').slice(0,10)===today).length;
 el.innerHTML='Data as of: <b>'+D.updated+'</b>'+
   (fresh?' &nbsp;<span style="color:var(--green)">✔ updated today</span>'
        :' &nbsp;<span style="color:#d29922">⚠ last update '+dataDay+' — no scan yet today</span>')+
   (marks?' &nbsp;<span class="dim">('+marks+' close-marks logged today)</span>':'');
})();
const fmt=(x,d=2)=>x==null||isNaN(x)?'—':Number(x).toFixed(d);
const money=x=>'$'+Number(x).toLocaleString(undefined,{maximumFractionDigits:0});
// track cards
let cards='';
for(const [t,a] of Object.entries(D.accounts)){
 if(t==='straddle_obs'||!a||!a.positions)continue;
 let eq=a.cash;
 for(const p of a.positions){eq+=(p.side||1)*(p.shares||0)*(p.last_px||0)+(p.contracts||0)*(p.last_bid||0)*100;}
 const ret=(eq/5000-1)*100;
 cards+=`<div class="card"><div class="name">${t}</div><div class="big">${money(eq)}</div>
 <div class="${ret>=0?'pos':'neg'}">${ret>=0?'+':''}${fmt(ret,1)}%</div>
 <div class="dim">${a.positions.length} open</div></div>`;}
document.getElementById('trackCards').innerHTML=cards;
// equity chart
const byTrack={};
for(const e of D.equity){(byTrack[e.track]=byTrack[e.track]||[]).push({x:e.ts.slice(0,10),y:e.equity});}
const colors={edgar:'#58a6ff',headline:'#d29922',puts:'#bc8cff'};
new Chart(document.getElementById('eqChart'),{type:'line',
 data:{datasets:Object.entries(byTrack).map(([t,pts])=>({label:t,data:pts,borderColor:colors[t]||'#3fb950',tension:.2,pointRadius:2}))},
 options:{scales:{x:{type:'category',ticks:{color:'#8b949e'}},y:{ticks:{color:'#8b949e'}}},
 plugins:{legend:{labels:{color:'#e6edf3'}}}}});
// tables
function table(id,rows,cols){
 const el=document.getElementById(id);
 if(!rows.length){el.innerHTML='<tr><td class="dim">nothing yet</td></tr>';return;}
 el.innerHTML='<tr>'+cols.map(c=>'<th>'+c[0]+'</th>').join('')+'</tr>'+
  rows.map(r=>'<tr>'+cols.map(c=>'<td>'+c[1](r)+'</td>').join('')+'</tr>').join('');}
const positions=[];
for(const [t,a] of Object.entries(D.accounts)) if(a&&a.positions) for(const p of a.positions) positions.push({track:t,...p});
table('posTable',positions,[
 ['track',r=>r.track],['ticker',r=>r.ticker],['signal',r=>r.signal||''],
 ['side',r=>r.type==='put'?'PUT':(r.side>0?'LONG':'SHORT')],
 ['size',r=>r.shares||r.contracts+'x'],['entry',r=>fmt(r.entry_px||r.entry_ask)],
 ['last',r=>fmt(r.last_px||r.last_bid)],
 ['P&L',r=>{const pnl=r.type==='put'?(r.last_bid-r.entry_ask)*100*r.contracts:(r.side*(r.last_px-r.entry_px)*r.shares);
   return `<span class="${pnl>=0?'pos':'neg'}">${fmt(pnl,0)}</span>`}],
 ['held',r=>r.days_held+'/'+r.exit_after+'d']]);
table('pendTable',D.pending.slice().reverse(),[
 ['ticker',r=>r.ticker],['signal',r=>r.signal],['track',r=>r.track],
 ['side',r=>r.side>0?'LONG':'SHORT'],['queued',r=>r.queued],['fills',r=>r.fill_not_before]]);
table('tradeTable',D.trades.slice().reverse(),[
 ['when',r=>r.ts.slice(5,16).replace('T',' ')],['track',r=>r.track],['action',r=>r.action],
 ['ticker',r=>r.ticker],['signal',r=>r.signal||''],
 ['px',r=>fmt(r.px||r.ask||r.bid)],
 ['net',r=>r.net_pnl==null?'—':`<span class="${r.net_pnl>=0?'pos':'neg'}">${fmt(r.net_pnl,0)}</span>`]]);
table('sigTable',D.signals.slice().reverse().slice(0,60),[
 ['when',r=>r.ts.slice(5,16).replace('T',' ')],['signal',r=>r.signal],
 ['ticker',r=>r.ticker||'<span class="dim">unresolved</span>'],
 ['status',r=>'<span class="tag">'+(r.action||'')+'</span>'],
 ['detail',r=>(r.title||r.buy_value&&('$'+Number(r.buy_value).toLocaleString())||'').toString().slice(0,70)]]);
table('ivTable',D.straddle.slice().reverse(),[
 ['when',r=>r.ts.slice(5,16).replace('T',' ')],['event',r=>r.label],['ticker',r=>r.ticker],
 ['side',r=>r.side],['strike',r=>fmt(r.strike,0)],['bid/ask',r=>fmt(r.bid)+' / '+fmt(r.ask)],
 ['IV',r=>r.iv?fmt(r.iv*100,1)+'%':'—']]);
</script></body></html>
