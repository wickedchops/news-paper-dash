<style>
:root{--bg:#0d1117;--card:#161b22;--border:#30363d;--text:#e6edf3;--dim:#8b949e;

*{box-sizing:border-box}body{margin:0;background:var(--bg);color:var(--text);
font-family:-apple-system,'Segoe UI',Roboto,sans-serif;padding:16px;max-width:1100px;margin:auto}

.dim{color:var(--dim);font-size:.8rem}
.cards{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:10px;margin:12px 0}
.card{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:12px}
.card .big{font-size:1.4rem;font-weight:600}.card .name{color:var(--dim);font-size:.75rem;text-transform:uppercase}
.pos{color:var(--green)}.neg{color:var(--red)}
table{width:100%;border-collapse:collapse;font-size:.8rem;background:var(--card);

th,td{padding:6px 8px;text-align:left;border-bottom:1px solid var(--border)}
th{color:var(--dim);font-weight:500;font-size:.7rem;text-transform:uppercase}
tr:last-child td{border-bottom:none}
.wrap{overflow-x:auto;border:1px solid var(--border);border-radius:10px}
canvas{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:8px}
.tag{padding:1px 7px;border-radius:9px;font-size:.7rem;border:1px solid var(--border)}
